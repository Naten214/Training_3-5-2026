name: My First Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Say Hello
        run: echo "Hello! The pipeline is running! 🚀"

      - name: Show files
        run: ls

      - name: Check HTML file exists
        run: |
          if [ -f app.py ]; then
            echo "app.py found! ✅"
          else
            echo "app.py NOT found! ❌"
            exit 1
          fi